<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookie Do</title>
  <link rel="stylesheet" href="../public/css/login.css">
  <link href="https://unkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  
</head>

<body class="d-flex justify-content-center">
    <div class="d-flex p-2 align-items-center vh-100">
        <form action="">
          <div class = "d-flex justify-content-center flex-column">
            <div class="d-flex justify-content-center">
              <h1 class="text-white">Login</h1>
            </div>
            <div class="d-flex justify-content-center pt-2" class="input-box">
                <input type="text" placeholder="Username"
                required>
                <i class='bx bxs-user-circle' ></i>
            </div>
            <div class="d-flex justify-content-center pt-2" class="input-box">
                <input type="password" placeholder="Password"
                required>
            </div>

            <div class="d-flex justify-content-center pt-2" class="remember">
              <label><input type="checkbox"> Lembrar-me</label>
            </div>
            <div class="d-flex justify-content-center pt-2" class="forgot">
              <a href="#">Esqueceu a password?</a>
            </div>

            <button type="submit" class="btn">Login</button>

            <div class="register-link pt-2"></div>
            <p>
              Ainda não tens conta Cookie Do?
              <a href="#">Criar conta</a>
            </p>
          </div>
          </form>
      
        
    </div>

</body>

</html>
